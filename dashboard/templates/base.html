<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}داشبورد ادمین{% endblock %} — Bot Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --sidebar-bg: #161b27;
      --card-bg: #1c2333;
      --border: #2a3347;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #06b6d4;
      --sidebar-w: 240px;
      --header-h: 56px;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,.4);
    }

    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; font-size: 14px; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w); background: var(--sidebar-bg); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top: 0; right: 0; height: 100vh;
      z-index: 100; transition: transform .25s;
    }
    .sidebar-header {
      height: var(--header-h); display: flex; align-items: center; gap: 10px;
      padding: 0 20px; border-bottom: 1px solid var(--border);
    }
    .sidebar-header .logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: grid; place-items: center; font-size: 18px; }
    .sidebar-header h1 { font-size: 15px; font-weight: 600; color: var(--text); }
    .sidebar-header span { font-size: 11px; color: var(--text-muted); }

    .sidebar-nav { padding: 16px 12px; flex: 1; }
    .nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); padding: 4px 10px 8px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px;
      color: var(--text-muted); text-decoration: none; font-size: 13.5px; font-weight: 500;
      transition: background .15s, color .15s; margin-bottom: 2px;
    }
    .nav-item:hover { background: rgba(59,130,246,.1); color: var(--text); }
    .nav-item.active { background: rgba(59,130,246,.18); color: var(--accent); }
    .nav-item .icon { width: 18px; text-align: center; font-size: 15px; }

    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }

    /* Main content */
    .main { margin-right: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    .topbar {
      height: var(--header-h); background: var(--sidebar-bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar h2 { font-size: 16px; font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .badge-live { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--success); }
    .badge-live::before { content: ''; width: 7px; height: 7px; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .content { padding: 24px; flex: 1; }

    /* Cards */
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text); }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; display: flex; flex-direction: column; gap: 6px; }
    .stat-card .stat-label { font-size: 12px; color: var(--text-muted); }
    .stat-card .stat-value { font-size: 26px; font-weight: 700; }
    .stat-card .stat-sub { font-size: 11px; color: var(--text-muted); }
    .stat-card.blue .stat-value { color: var(--accent); }
    .stat-card.green .stat-value { color: var(--success); }
    .stat-card.yellow .stat-value { color: var(--warning); }
    .stat-card.red .stat-value { color: var(--danger); }
    .stat-card.cyan .stat-value { color: var(--info); }

    /* Grid layouts */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 24px; }

    /* Tables */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: right; padding: 10px 12px; color: var(--text-muted); font-weight: 500; font-size: 11.5px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 10px 12px; border-bottom: 1px solid rgba(42,51,71,.6); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(59,130,246,.04); }

    /* Badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .badge-success { background: rgba(16,185,129,.15); color: var(--success); }
    .badge-warning { background: rgba(245,158,11,.15); color: var(--warning); }
    .badge-danger { background: rgba(239,68,68,.15); color: var(--danger); }
    .badge-info { background: rgba(6,182,212,.15); color: var(--info); }
    .badge-default { background: rgba(136,146,164,.15); color: var(--text-muted); }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; text-decoration: none; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: rgba(239,68,68,.15); color: var(--danger); border: 1px solid rgba(239,68,68,.3); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

    /* Form */
    input, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 8px 12px; font-size: 13px; width: 100%; outline: none; }
    input:focus, select:focus { border-color: var(--accent); }

    /* Avatar */
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; color: #fff; flex-shrink: 0; }

    /* Log colors */
    .log-debug { color: #8892a4; }
    .log-info { color: #06b6d4; }
    .log-warning { color: #f59e0b; }
    .log-error { color: #ef4444; }
    .log-critical { color: #ef4444; font-weight: 700; }

    /* Misc */
    .text-muted { color: var(--text-muted); }
    .text-success { color: var(--success); }
    .text-danger { color: var(--danger); }
    .text-warning { color: var(--warning); }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .dir-ltr { direction: ltr; }
    .font-mono { font-family: 'Courier New', monospace; font-size: 12px; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(100%); }
      .main { margin-right: 0; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">🤖</div>
    <div>
      <h1>Bot Admin</h1>
      <span>پنل مدیریت</span>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">منو</div>
    <a href="/" class="nav-item {% if page == 'dashboard' %}active{% endif %}">
      <span class="icon">📊</span> داشبورد
    </a>
    <a href="/users" class="nav-item {% if page == 'users' %}active{% endif %}">
      <span class="icon">👥</span> کاربران
    </a>
    <a href="/courses" class="nav-item {% if page == 'courses' %}active{% endif %}">
      <span class="icon">📚</span> دروس
    </a>
    <a href="/quiz-stats" class="nav-item {% if page == 'quiz' %}active{% endif %}">
      <span class="icon">🧠</span> آمار کوییز
    </a>
    <div class="nav-label" style="margin-top:12px">سیستم</div>
    <a href="/logs" class="nav-item {% if page == 'logs' %}active{% endif %}">
      <span class="icon">📋</span> لاگ‌ها
    </a>
  </nav>
  <div class="sidebar-footer">
    <a href="/logout" class="nav-item">
      <span class="icon">🚪</span> خروج
    </a>
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <h2>{% block page_title %}داشبورد{% endblock %}</h2>
    <div class="topbar-right">
      <span class="badge-live">آنلاین</span>
    </div>
  </header>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</main>

</body>
</html>
